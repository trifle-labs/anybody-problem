<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <style>
      body {
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      html,
      body,
      * {
        margin: 0px;
        padding: 0px;
      }
      :root {
        /* Portrait orientation: use min of screen width and 800px, height is 1.5x width */
        --canvas-width-portrait: min(800px, 100vw);
        --canvas-height-portrait: calc(var(--canvas-width-portrait) * 1.5);

        /* Landscape orientation: use min of screen height and 1200px, width is 2/3 of height */
        --canvas-height-landscape: min(1200px, 100vh);
        --canvas-width-landscape: calc(var(--canvas-height-landscape) * 2 / 3);
      }

      /* Portrait orientation (height > width) */
      @media (orientation: portrait) {
        canvas {
          cursor: pointer;
          width: var(--canvas-width-portrait) !important;
          height: var(--canvas-height-portrait) !important;
        }
      }

      /* Landscape orientation (width > height) */
      @media (orientation: landscape) {
        canvas {
          cursor: pointer;
          width: var(--canvas-width-landscape) !important;
          height: var(--canvas-height-landscape) !important;
        }
      }
    </style>
  </head>
  <body></body>
  <script type="module">
    // NOTE: needs to come after body
    import * as nft from './nft.js'
  </script>
</html>
